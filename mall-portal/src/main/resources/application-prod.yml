server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://db:3306/your_database?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: your_db_username
    password: your_db_password
    druid:
      initial-size: 5 #连接池初始化大小
      min-idle: 10 #最小空闲连接数
      max-active: 20 #最大连接数
      web-stat-filter:
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*" #不统计这些请求数据
      stat-view-servlet: #访问监控网页的登录用户名和密码
        login-username: your_druid_username
        login-password: your_druid_password

  data:
    mongodb:
      host: your_mongodb_host
      port: 27017
      database: your_mongodb_database

  redis:
    host: redis # Redis服务器地址
    database: 0 # Redis数据库索引（默认为0）
    port: 6379 # Redis服务器连接端口
    password: your_redis_password # Redis服务器连接密码
    timeout: 300ms # 连接超时时间（毫秒）

  rabbitmq:
    host: rabbit
    port: 5672
    virtual-host: /your_vhost
    username: your_rabbitmq_username
    password: your_rabbitmq_password

mongo:
  insert:
    sqlEnable: true # 用于控制是否通过数据库数据来插入mongo

logging:
  file:
    path: /var/logs
  level:
    root: info
    com.macro.mall: info

logstash:
  host: logstash

alipay:
  gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  appId: your_app_id
  alipayPublicKey: your_alipay_public_key
  appPrivateKey: your_app_private_key
  returnUrl: http://your-domain/#/pages/money/paySuccess
  notifyUrl:

